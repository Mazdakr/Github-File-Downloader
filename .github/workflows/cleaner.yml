---
name: 🗑 02 - Clean downloads folder

on:
  workflow_dispatch:
    inputs:
      target:
        description: '📂 Folder to delete (type "all" to clean everything, or the exact subfolder name)'
        required: false
        default: 'all'
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 120               # <-- generous timeout for huge repos
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Clean selected folder
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TARGET="${{ github.event.inputs.target }}"

          echo "AVASAM (https://avasam.ir) - Cleaning downloads"
          echo ""

          # Helper: recursively remove a directory in batches of 100 files
          batch_delete() {
            local folder="$1"
            if [ ! -d "$folder" ]; then
              return
            fi
            echo "Batch-deleting files inside $folder ..."
            # Collect all files, remove in chunks
            find "$folder" -type f -print0 > /tmp/files_to_delete.txt
            if [ ! -s /tmp/files_to_delete.txt ]; then
              rmdir "$folder" 2>/dev/null || true
              return
            fi
            while IFS= read -r -d '' file; do
              git rm -f "$file" 2>/dev/null || rm -f "$file"
            done < <(head -z -n 100 /tmp/files_to_delete.txt)

            # Continue until the folder is empty
            local safety=0
            while [ -d "$folder" ] && [ "$(ls -A "$folder" 2>/dev/null)" ] && [ $safety -lt 50 ]; do
              safety=$((safety+1))
              find "$folder" -type f -print0 | head -z -n 100 | while IFS= read -r -d '' file; do
                git rm -f "$file" 2>/dev/null || rm -f "$file"
              done
              # Remove empty subdirectories
              find "$folder" -type d -empty -delete 2>/dev/null || true
            done
            # Final sweep
            git rm -rf "$folder" 2>/dev/null || rm -rf "$folder" 2>/dev/null
            rm -f /tmp/files_to_delete.txt
          }

          if [ "$TARGET" = "all" ] || [ -z "$TARGET" ]; then
            echo "Removing entire downloads folder..."
            if [ -d "downloads" ]; then
              batch_delete "downloads"
            fi

            mkdir -p downloads
            printf '## empty\nfor start go Action tab and use left side workflows\n' > downloads/README.md
            git add -f downloads/README.md
          else
            FOLDER="downloads/$TARGET"
            if [ -d "$FOLDER" ]; then
              echo "Removing folder: $FOLDER"
              batch_delete "$FOLDER"
            else
              echo "Folder '$TARGET' does not exist inside downloads/. Nothing to delete."
              exit 0
            fi

            # Recreate minimal README if downloads/ is now empty
            if [ ! -d "downloads" ] || [ -z "$(ls -A downloads 2>/dev/null)" ]; then
              mkdir -p downloads
              printf '## empty\nfor start go Action tab and use left side workflows\n' > downloads/README.md
              git add -f downloads/README.md
            fi
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[AVASAM] Clean downloads – target: $TARGET [skip ci]"

          echo "Pushing changes..."

          RETRY=0
          MAX_RETRIES=5
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git rebase origin/"$BRANCH" 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git reset --hard HEAD~1 2>/dev/null || true
              git pull --rebase origin "$BRANCH" 2>/dev/null || true

              # Redo deletion in case of rebase conflict
              if [ "$TARGET" = "all" ] || [ -z "$TARGET" ]; then
                rm -rf downloads/ 2>/dev/null || true
                mkdir -p downloads
                printf '## empty\nfor start go Action tab and use left side workflows\n' > downloads/README.md
                git add -f downloads/README.md
              else
                rm -rf "downloads/$TARGET" 2>/dev/null || true
              fi
              git commit -m "[AVASAM] Clean downloads – target: $TARGET [skip ci]" 2>/dev/null || true
            }

            if timeout 120 git push origin HEAD:"$BRANCH" 2>&1; then
              echo ""
              echo "=========================================="
              echo "✅ Folder cleaned successfully!"
              echo "AVASAM (https://avasam.ir)"
              echo "=========================================="
              exit 0
            else
              echo "Push failed, retry $RETRY/$MAX_RETRIES..."
              sleep $((2 + RANDOM % 5))
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1